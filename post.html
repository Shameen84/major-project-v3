<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post Job - Freelanzo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- Yahan background color change kiya gaya hai aur text ko white kiya hai readability ke liye -->
<body class="container mt-5" style="background-color: #005C4B; color: white;">

<!-- Heading -->
<h2 class="text-center">Post a Job</h2>
<p class="text-center">Fill details to hire freelancers</p>

<!-- Form -->
<form id="jobForm" class="mt-4 p-4 rounded" style="background: rgba(255,255,255,0.1);">

  <!-- Title -->
  <input type="text" id="title" placeholder="Job Title" class="form-control mb-3" required>

  <!-- Description -->
  <textarea id="description" placeholder="Job Description" class="form-control mb-3" required></textarea>

  <!-- Budget -->
  <input type="number" id="budget" placeholder="Budget Rs." class="form-control mb-3" required>

  <!-- Skills -->
  <input type="text" id="skills" placeholder="Required Skills (HTML, CSS, JS)" class="form-control mb-3">

  <!-- Submit -->
  <button class="btn btn-primary w-100">Post Job</button>

</form>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
