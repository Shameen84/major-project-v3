<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat - Freelanzo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      /* Aapka manga hua gradient color */
      background: linear-gradient(to right, darkgreen, #09b65c);
      min-height: 100vh;
      color: white;
      font-family: sans-serif;
    }
    #chatBox {
      height: 400px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow-y: scroll;
      background: #f9f9f9;
    }
    .message {
      padding: 8px;
      margin: 5px 0;
      background: #d1e7dd;
      border-radius: 5px;
      width: fit-content;
    }
  </style>
</head>

<body class="container mt-5">

<h2 class="text-center">Chat</h2>

<!-- Chat Box -->
<div id="chatBox"></div>

<!-- Input -->
<div class="input-group mt-3">
  <input type="text" id="messageInput" class="form-control" placeholder="Type message...">
  <button class="btn btn-primary" id="sendBtn">Send</button>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
