<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Freelanzo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .navbar { background: #fff; border-bottom: 1px solid #e4e5e7; padding: 15px 5%; display: flex; align-items: center; height: 60px; }
        .navbar-brand { color: #404145; font-weight: 900; font-size: 24px; text-decoration: none; }
        .chat-main-wrapper { height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 10px; }
        .chat-container { width: 100%; max-width: 800px; height: 90vh; background: #fff; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e4e5e7; }
        .header { background-color: #ffffff; padding: 10px 20px; display: flex; align-items: center; color: #404145; gap: 15px; border-bottom: 1px solid #e4e5e7; }
        .avatar { width: 40px; height: 40px; background: #1dbf73; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #status { font-size: 13px; color: #1dbf73; font-weight: 500; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-color: #f0f2f5; }
        .bubble { max-width: 75%; padding: 10px 14px; font-size: 15px; border-radius: 15px; position: relative; line-height: 1.4; cursor: pointer; user-select: none; }
        .sent { background-color: #1dbf73; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .received { background-color: #ffffff; align-self: flex-start; color: #404145; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        .info-row { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 4px; font-size: 10px; }
        .ticks { font-size: 12px; opacity: 0.8; display: none; }
        .sent .ticks { display: inline; }
        .read { color: #fff !important; font-weight: bold; }
        .edited-tag { font-size: 9px; opacity: 0.7; margin-right: 5px; font-style: italic; display: none; }
        .footer { background-color: #fff; padding: 10px 20px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #e4e5e7; }
        .input-area { flex: 1; background-color: #f4f7f6; border-radius: 20px; padding: 10px 15px; color: #404145; border: 1px solid #e4e5e7; outline: none; }
        .btn-action { background: none; border: none; cursor: pointer; color: #62646a; font-size: 20px; }
        #sendBtn { color: #1dbf73; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="index.html">Freelanzo<span style="color: #1dbf73;">.</span></a>
</nav>

<div class="chat-main-wrapper">
    <div class="chat-container">
        <div class="header">
            <div class="avatar">FC</div>
            <div>
                <div style="font-weight: 700; font-size: 15px;">Freelanzo Client</div>
                <div id="status">Online</div>
            </div>
        </div>
        <div id="chatBox"></div>
        <div class="footer">
            <label for="fileIn" class="btn-action">📎</label>
            <input type="file" id="fileIn" hidden accept="image/*">
            <input type="text" id="msgInput" class="input-area" placeholder="Type a message...">
            <button id="sendBtn" class="btn-action">➤</button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('status');
    const fileIn = document.getElementById('fileIn');

    function addMessage(content, type, isImage = false) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        let body = isImage ? `<img src="${content}">` : `<span class="txt">${content}</span>`;
        div.innerHTML = `${body}<div class="info-row"><span class="edited-tag">edited</span><span class="time">${time}</span><span class="ticks">✓✓</span></div>`;
        
        div.ondblclick = () => { if(confirm("Delete this message?")) div.remove(); };
        
        div.oncontextmenu = (e) => {
            e.preventDefault();
            if(isImage || type === 'received') return;
            const span = div.querySelector('.txt');
            const newMsg = prompt("Edit your message:", span.innerText);
            if(newMsg && newMsg.trim() !== "") {
                span.innerText = newMsg;
                div.querySelector('.edited-tag').style.display = "inline";
            }
        };

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    sendBtn.onclick = () => {
        const text = msgInput.value.trim();
        if (text) {
            const myMsg = addMessage(text, 'sent');
            msgInput.value = "";
            setTimeout(() => { myMsg.querySelector('.ticks').classList.add('read'); }, 500);
            setTimeout(() => { 
                statusText.innerText = "Typing..."; 
                setTimeout(() => {
                    statusText.innerText = "Online";
                    addMessage("Okay, received!", "received");
                }, 1500);
            }, 1000);
        }
    };

    fileIn.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => addMessage(ev.target.result, 'sent', true);
            reader.readAsDataURL(file);
        }
    };

    msgInput.onkeydown = (e) => { if (e.key === 'Enter') sendBtn.click(); };
</script>
</body>
</html>
